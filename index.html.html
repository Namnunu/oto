<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Quiz Nền Mặt Đường</title>
<style>
:root{
 --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,"Noto Sans","Helvetica Neue",sans-serif;
 --color-background-primary:#ffffff;
 --color-background-secondary:#f5f5f5;
 --color-background-info:#e8f3ff;
 --color-text-primary:#111827;
 --color-text-secondary:#6b7280;
 --color-text-info:#2563eb;
 --color-border-primary:#d1d5db;
 --color-border-secondary:#d1d5db;
 --color-border-tertiary:#e5e7eb;
 --border-radius-md:8px;
 --border-radius-lg:12px;
}
body{margin:0;padding:12px;font-family:var(--font-sans);-webkit-text-size-adjust:100%;}
</style>
</head>
<body>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
#app { padding: 1rem 0; }
.header { margin-bottom: 1.5rem; }
.progress-bar { height: 6px; background: var(--color-background-secondary); border-radius: 3px; margin-bottom: 0.75rem; }
.progress-fill { height: 100%; border-radius: 3px; background: #1D9E75; transition: width 0.3s; }
.meta { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); }
.score-badge { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 2px 10px; font-size: 13px; font-weight: 500; color: var(--color-text-primary); }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.chapter-tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); background: var(--color-background-info); color: var(--color-text-info); margin-bottom: 0.75rem; font-weight: 500; }
.question-text { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.6; margin-bottom: 1.25rem; }
.options { display: flex; flex-direction: column; gap: 8px; }
.option-btn { width: 100%; text-align: left; padding: 10px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.5; }
.option-btn:hover:not(:disabled) { background: var(--color-background-secondary); border-color: var(--color-border-primary); }
.option-btn.correct { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
.option-btn.wrong { background: #FCEBEB; border-color: #E24B4A; color: #501313; }
.option-btn.reveal { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
.option-btn:disabled { cursor: default; }
.feedback { margin-top: 1rem; padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 14px; line-height: 1.5; }
.feedback.correct { background: #E1F5EE; color: #085041; }
.feedback.wrong { background: #FCEBEB; color: #501313; }
.nav-row { display: flex; gap: 10px; margin-top: 1rem; }
.nav-btn { flex: 1; padding: 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; font-weight: 500; }
.nav-btn:hover { background: var(--color-background-secondary); }
.nav-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.nav-btn.primary:hover { background: #0F6E56; }
.result-card { text-align: center; padding: 2rem 1.25rem; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); }
.result-score { font-size: 48px; font-weight: 500; color: #1D9E75; margin: 0.5rem 0; }
.result-label { font-size: 14px; color: var(--color-text-secondary); }
.result-msg { font-size: 15px; color: var(--color-text-primary); margin: 1rem 0; }
.shuffle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 13px; color: var(--color-text-secondary); }
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn { padding: 4px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 12px; cursor: pointer; }
.filter-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.source-credit { text-align: center; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
.mode-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.mode-btn { flex: 1; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; }
.mode-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.mode-btn:hover:not(.active) { background: var(--color-background-secondary); }
.exam-start-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem 1.25rem; text-align: center; }
.exam-start-card h2 { font-size: 18px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 0.75rem; }
.exam-start-card p { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 0.5rem; line-height: 1.6; }
.exam-info-list { list-style: none; margin: 1rem 0 1.5rem; display: flex; flex-direction: column; gap: 6px; }
.exam-info-list li { font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 14px; }
.exam-result-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 2rem 1.25rem; text-align: center; }
.exam-score-big { font-size: 64px; font-weight: 700; line-height: 1; margin: 0.5rem 0; }
.exam-score-big.pass { color: #1D9E75; }
.exam-score-big.fail { color: #E24B4A; }
.exam-grade-label { font-size: 15px; font-weight: 600; margin: 0.5rem 0; }
.exam-stats { display: flex; justify-content: center; gap: 20px; margin: 1rem 0; flex-wrap: wrap; }
.exam-stat { text-align: center; }
.exam-stat-val { font-size: 22px; font-weight: 600; color: var(--color-text-primary); }
.exam-stat-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.review-list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 12px; }
.review-item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; text-align: left; }
.review-item.correct-item { border-left: 3px solid #1D9E75; }
.review-item.wrong-item { border-left: 3px solid #E24B4A; }
.review-q { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 0.5rem; line-height: 1.5; }
.review-ans { font-size: 13px; margin: 3px 0; }
.review-ans.correct { color: #085041; }
.review-ans.wrong { color: #501313; }
.no-answer-note { font-size: 13px; color: var(--color-text-secondary); font-style: italic; }
.exam-option-btn { width: 100%; text-align: left; padding: 10px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s, border-color 0.15s; line-height: 1.5; margin-bottom: 8px; }
.exam-option-btn:hover:not(.selected) { background: var(--color-background-secondary); }
.exam-option-btn.selected { background: #EEF6FF; border-color: #3B82F6; color: #1E3A5F; }
.exam-progress-text { font-size: 13px; color: var(--color-text-secondary); }
.question-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; margin: 1rem 0; }
.q-nav-dot { width: 32px; height: 32px; border-radius: 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.q-nav-dot.answered { background: #1D9E75; color: #fff; border-color: #1D9E75; }
.q-nav-dot.current { border-color: #3B82F6; color: #3B82F6; font-weight: 700; }
.submit-section { margin-top: 1rem; padding: 1rem; background: var(--color-background-secondary); border-radius: var(--border-radius-md); font-size: 13px; color: var(--color-text-secondary); text-align: center; }
</style>

<div id="app"></div>

<script>
const ALL_QUESTIONS = [
  {id:1,ch:"Chương 1",q:"Nếu đường ô tô luôn luôn ổn định toàn khối khi?",opts:["Cường độ nền đường không được thay đổi theo thời gian, theo khí hậu, theo thời tiết, một cách bất lợi","Do độ bền khi chịu cắt trượt và không bị biến dạng quá nhiều dưới tác dụng của áp lực xe","Kích thước hình học và hình dạng của nền đường không bị phá hoại hoặc biến dạng trong mọi hoàn cảnh","Cả A, B và C đều đúng"],ans:3},
  {id:2,ch:"Chương 1",q:"Biện pháp xử lý khi đắp nền đường trên sườn dốc 30% là?",opts:["Đánh bậc (Đánh cấp)","Dãy cỏ","Làm tường chắn","Cả A, B và C đều đúng"],ans:3},
  {id:3,ch:"Chương 1",q:"Chế độ thủy nhiệt của nền đường loại nào là ổn định nhất?",opts:["Nền đường đào hoàn toàn","Nền đường đắp hoàn toàn","Nền đường đào chữ L","Nền đường nửa đào nửa đắp"],ans:1},
  {id:4,ch:"Chương 1",q:"Các biện pháp cải thiện chế độ thủy nhiệt của nền đường?",opts:["Đầm nền chặt đất nền đường","Biện pháp đắp cao nền đường","Biện pháp thoát nước và ngăn chặn các nguồn ẩm","Cả A, B và C đều đúng"],ans:3},
  {id:5,ch:"Chương 1",q:"Khi xây dựng nền đường trên sườn dốc, biện pháp đánh cấp được sử dụng để xử lý trong trường hợp độ dốc sườn dốc là?",opts:["≤ 20%","20% - 50%","> 50%","Cả A, B và C đều sai"],ans:1},
  {id:6,ch:"Chương 1",q:"Đoạn nền đắp chịu tác dụng của nước chảy và sóng vỗ cần chọn hình thức gia cố taluy nào?",opts:["Trồng cỏ hoặc cây bụi","Bê tông đất sét","Đầm chặt mái taluy","Xây đá hộc hoặc lát các tấm đan bê tông"],ans:3},
  {id:7,ch:"Chương 1",q:"Đối với đường cấp I, cấp II phải đảm bảo sức chịu tải CBR của 30cm trên cùng trong khu vực tác dụng của nền đường đạt tối thiểu bằng bao nhiêu?",opts:["8","6","5","4"],ans:0},
  {id:8,ch:"Chương 1",q:"Nền đường phải luôn đảm bảo ổn định về mặt cường độ, nghĩa là?",opts:["Cường độ của nền đường không được thay đổi theo thời gian","Cường độ của nền đường thay đổi theo thời gian, theo điều kiện khí hậu thời tiết một cách bất lợi","Cường độ của nền đường không được thay đổi theo thời gian, theo điều kiện khí hậu, thời tiết một cách bất lợi","Cường độ của nền đường thay đổi theo thời gian, theo điều kiện khí hậu, thời tiết một cách thuận lợi"],ans:2},
  {id:9,ch:"Chương 1",q:"Xác định chiều sâu hoạt động của đất nền đường, thông thường giả thiết n = 5–10 và với các tải trọng bánh xe thông thường sẽ tính được Za =?",opts:["< 0,5m","0,9 – 1,5m","0,5 – 0,8m","> 1,5m"],ans:1},
  {id:10,ch:"Chương 1",q:"Tác dụng của nền đường là?",opts:["Khắc phục địa hình thiên nhiên nhằm tạo dải đất đủ rộng dọc theo tuyến đường","Làm cơ sở cho áo đường: lớp phía trên cùng với áo đường chịu tác dụng của tải trọng xe cộ","Cả A và B đều đúng","Cả A và B đều sai"],ans:2},
  {id:11,ch:"Chương 1",q:"Độ dốc mái taluy nền đào thông dụng là bao nhiêu?",opts:["1:1,5","1:1","1,5:1","1:2"],ans:0},
  {id:12,ch:"Chương 1",q:"Khi chọn độ dốc mái taluy nền đường đào dựa trên cơ sở nào?",opts:["Chiều sâu nền đào","Loại vật liệu đắp","Địa chất dưới chân nền đắp","Cả A, B và C đều đúng"],ans:0},
  {id:13,ch:"Chương 1",q:"Cao độ thiết kế mép mặt đường ở những đoạn ven sông, cống phải cao hơn mức nước ngập theo tần suất tính toán tối thiểu là?",opts:["0,3m","0,5m","0,4m","A, B, C sai"],ans:1},
  {id:14,ch:"Chương 1",q:"Khi xây dựng nền đường trên sườn dốc, trường hợp nào phải thiết kế công trình chống đỡ (tường chắn)?",opts:["> 20%","20 – 50%","> 50%","> 40%"],ans:2},
  {id:15,ch:"Chương 1",q:"Thiết kế áo đường mềm cấp V–VI, tổng chiều dày < 60cm, lớp đất trên cùng dưới đáy áo đường yêu cầu?",opts:["K ≥ 0,95, H = 30cm","K ≥ 0,98, H = 30cm","K ≥ 0,98, H = 50cm","K ≥ 0,95, H = 50cm"],ans:3},
  {id:16,ch:"Chương 1",q:"Trường hợp nào cần kiểm toán ổn định mái dốc taluy nền đường đắp trên đất thông thường?",opts:["Chiều cao taluy < 6m","Chiều cao taluy > 6m","Chiều cao taluy > 6 – 8m","Chiều cao taluy > 12m"],ans:1},
  {id:17,ch:"Chương 1",q:"Thiết kế áo đường mềm cấp I–IV, tổng chiều dày > 60cm, lớp đất trên cùng dưới đáy áo đường yêu cầu?",opts:["K ≥ 0,95, H = 30cm","K ≥ 0,98, H = 30cm","K ≥ 0,98, H = 50cm","K ≥ 0,95, H = 50cm"],ans:0},
  {id:18,ch:"Chương 1",q:"Đánh giá sự ổn định của nền đường đắp trên sườn dốc theo sơ đồ nào?",opts:["Mặt trượt phẳng","Mặt trượt gãy khúc","Mặt trượt quay","Cả A, B và C đều sai"],ans:0},
  {id:19,ch:"Chương 1",q:"Thiết kế áo đường mềm cấp V–VI, tổng chiều dày > 60cm, lớp đất trên cùng dưới đáy áo đường yêu cầu?",opts:["K ≥ 0,95, H = 30cm","K ≥ 0,98, H = 30cm","K ≥ 0,98, H = 50cm","K ≥ 0,95, H = 50cm"],ans:3},
  {id:20,ch:"Chương 1",q:"Khi chọn độ dốc mái taluy nền đường đào dựa trên cơ sở nào? (câu 22)",opts:["Chiều sâu nền đào","Thế nằm của đất đá","Địa chất tại nền đào","Cả A, B và C"],ans:3},
  {id:21,ch:"Chương 1",q:"Bê tông xi măng làm mặt đường theo TCCS39:2022/TCĐBVN có cường độ chịu nén tối thiểu là?",opts:["30 MPa","25 MPa","20 MPa","15 MPa"],ans:0},
  {id:22,ch:"Chương 1",q:"Lớp móng trong kết cấu áo đường bê tông xi măng nhằm mục đích?",opts:["Giảm áp lực tải trọng ô tô xuống nền đất, hạn chế nước ngấm qua khe","Giảm tích lũy biến dạng ở góc và cạnh tấm, đảm bảo độ bằng phẳng","Đảm bảo ô tô, xe máy đi lại trong thời gian thi công","Cả A, B và C đều đúng"],ans:3},
  {id:23,ch:"Chương 1",q:"Áo đường cứng là?",opts:["Kết cấu có lớp móng bằng đá dăm gia cố xi măng","Kết cấu có lớp móng bằng đá dăm gia cố nhựa","Kết cấu có lớp mặt hoặc lớp móng bằng bê tông xi măng","Kết cấu có lớp mặt hoặc lớp móng bằng bê tông nhựa"],ans:2},
  {id:24,ch:"Chương 1",q:"Khoảng cách giữa các khe dọc trong mặt đường BTXM thường là?",opts:["> 5m","Không vượt quá 4,5m và thường bằng bề rộng một làn xe","= 5m","Cả A, B và C đều sai"],ans:1},
  {id:25,ch:"Chương 1",q:"Mục đích của việc bố trí các khe co, dãn là?",opts:["Tạo điều kiện thuận lợi cho nước thấm qua tấm BTXM","Tăng khả năng an toàn cho phương tiện vận hành","Giảm ứng suất nhiệt trong tấm khi nhiệt độ thay đổi","Tăng khả năng chịu kéo khi uốn của tấm BTXM"],ans:2},
  {id:26,ch:"Chương 1",q:"Chiều rộng lớp móng trên phải rộng hơn chiều rộng phần xe chạy mỗi bên bao nhiêu nếu dùng công nghệ ván khuôn trượt?",opts:["30cm","45cm","50cm","55cm"],ans:1},
  {id:27,ch:"Chương 1",q:"Lớp ngăn cách trong kết cấu áo đường BTXM KHÔNG nhằm mục đích nào?",opts:["Giảm ma sát giữa đáy tấm BTXM và lớp móng bên dưới","Tăng ma sát giữa đáy tấm BTXM và lớp móng bên dưới","Ngăn không cho nước từ các khe nối thấm xuống bên dưới","Giữ nước cho quá trình hydrat hóa của BTXM"],ans:1},
  {id:28,ch:"Chương 1",q:"Cốt thép trong khe nối giữa các tấm BTXM nhằm mục đích?",opts:["Truyền lực giữa các tấm BTXM liền kề","Cải thiện khả năng chống nứt của tấm BTXM","Tăng cường độ của tấm BTXM","Hạn chế phá hoại tại góc tấm"],ans:0},
  {id:29,ch:"Chương 1",q:"Chiều rộng lớp móng trên phải rộng hơn mỗi bên bao nhiêu nếu dùng công nghệ thi công đơn giản?",opts:["30cm","45cm","50cm","65cm"],ans:3},
  {id:30,ch:"Chương 1",q:"Mục đích của các khe co là?",opts:["Tạo điều kiện cho nước thấm qua tấm BTXM","Tăng khả năng an toàn cho phương tiện","Tạo không gian để tấm BTXM dịch chuyển khi thể tích thay đổi do nhiệt độ giảm","Xác định trước vị trí các khe nứt có thể xảy ra khi tấm BTXM co lại"],ans:3},

const CHAPTERS = ["Tất cả", "Chương 1", "Chương 2", "Chương 3"];
const LABELS = ["A","B","C","D"];

let state = {
  chapter: "Tất cả",
  questions: [],
  idx: 0,
  answered: {},
  score: 0,
  done: false,
  shuffle: true
};

let examState = {
  phase: 'start',
  questions: [],
  answers: {},
  idx: 0
};

let appMode = 'practice';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ========== PRACTICE MODE ==========
function initQuiz() {
  let pool = ALL_QUESTIONS;
  if (state.chapter !== "Tất cả") pool = pool.filter(q => q.ch === state.chapter);
  state.questions = state.shuffle ? shuffle(pool) : pool;
  state.idx = 0;
  state.answered = {};
  state.score = 0;
  state.done = false;
  render();
}

function render() {
  const app = document.getElementById('app');
  const modeTabs = `<div class="mode-row">
    <button class="mode-btn${appMode==='practice'?' active':''}" onclick="switchMode('practice')">📚 Luyện tập</button>
    <button class="mode-btn${appMode==='exam'?' active':''}" onclick="switchMode('exam')">📝 Kiểm tra</button>
  </div>`;

  if (appMode === 'exam') { renderExam(modeTabs); return; }

  if (state.done) { app.innerHTML = modeTabs + renderResult(); return; }
  const q = state.questions[state.idx];
  const total = state.questions.length;
  const pct = Math.round((state.idx / total) * 100);
  const ans = state.answered[state.idx];
  const answered = ans !== undefined;

  app.innerHTML = modeTabs + `
    <div class="header">
      <div class="source-credit">Nguồn: Lê Văn Nam - QLXD K65</div>
      <div class="filter-row">
        ${CHAPTERS.map(ch => `<button class="filter-btn${state.chapter===ch?' active':''}" onclick="setChapter('${ch}')">${ch}</button>`).join('')}
      </div>
      <div class="shuffle-row">
        <input type="checkbox" id="sh" ${state.shuffle?'checked':''} onchange="toggleShuffle(this.checked)">
        <label for="sh">Trộn câu hỏi ngẫu nhiên</label>
        <span style="margin-left:auto" class="score-badge">✓ ${state.score}/${Object.keys(state.answered).length}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="meta">
        <span style="color:var(--color-text-secondary);font-size:13px">${q.ch}</span>
        <span style="color:var(--color-text-secondary);font-size:13px">Câu ${state.idx+1}/${total}</span>
      </div>
    </div>
    <div class="card">
      <div class="chapter-tag">${q.ch}</div>
      <div class="question-text">Câu ${state.idx+1}: ${q.q}</div>
      <div class="options">
        ${q.opts.map((opt,i) => {
          let cls = '';
          if (answered) {
            if (i === q.ans) cls = 'correct';
            else if (i === ans && ans !== q.ans) cls = 'wrong';
          }
          return `<button class="option-btn ${cls}" ${answered?'disabled':''} onclick="answer(${i})">
            <strong>${LABELS[i]}.</strong> ${opt}
          </button>`;
        }).join('')}
      </div>
      ${answered ? `<div class="feedback ${ans===q.ans?'correct':'wrong'}">
        ${ans===q.ans ? '✓ Chính xác!' : `✗ Sai rồi! Đáp án đúng: <strong>${LABELS[q.ans]}. ${q.opts[q.ans]}</strong>`}
      </div>` : ''}
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${state.idx===0?'disabled':''}>← Trước</button>
      ${state.idx < total-1
        ? `<button class="nav-btn primary" onclick="next()" ${!answered?'disabled':''}>Tiếp →</button>`
        : `<button class="nav-btn primary" onclick="finish()" ${!answered?'disabled':''}>Xem kết quả</button>`}
    </div>`;
}

function renderResult() {
  const total = state.questions.length;
  const pct = Math.round((state.score/total)*100);
  let msg = pct>=80?'Xuất sắc! Bạn nắm vững kiến thức rồi 🎉':pct>=60?'Khá tốt! Ôn thêm một chút nữa nhé.':'Cần ôn tập thêm bạn nhé. Cố lên!';
  return `<div class="result-card">
    <div style="font-size:15px;color:var(--color-text-secondary);margin-bottom:0.5rem">Kết quả luyện tập</div>
    <div class="result-score">${state.score}/${total}</div>
    <div class="result-label">${pct}% chính xác</div>
    <div class="result-msg">${msg}</div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:1rem">
      <button class="nav-btn" onclick="review()" style="flex:none;padding:10px 20px">Xem lại đáp án</button>
      <button class="nav-btn primary" onclick="initQuiz()" style="flex:none;padding:10px 20px">Làm lại</button>
    </div>
  </div>`;
}

function answer(i) {
  if (state.answered[state.idx] !== undefined) return;
  state.answered[state.idx] = i;
  if (i === state.questions[state.idx].ans) state.score++;
  render();
}

function next() { if(state.idx < state.questions.length-1){state.idx++;render();} }
function prev() { if(state.idx > 0){state.idx--;render();} }
function finish() { state.done = true; render(); }
function review() { state.done = false; state.idx = 0; render(); }
function setChapter(ch) { state.chapter = ch; initQuiz(); }
function toggleShuffle(v) { state.shuffle = v; initQuiz(); }

// ========== MODE SWITCHING ==========
function switchMode(mode) {
  appMode = mode;
  if (mode === 'exam' && examState.phase === 'start') { renderExamStart(); return; }
  if (mode === 'practice') { render(); return; }
  render();
}

// ========== EXAM MODE ==========
function startExam() {
  const pool = shuffle(ALL_QUESTIONS).slice(0, 30);
  examState = { phase: 'doing', questions: pool, answers: {}, idx: 0 };
  render();
}

function examSelectAnswer(i) {
  examState.answers[examState.idx] = i;
  render();
}

function examGoTo(idx) {
  examState.idx = idx;
  render();
}

function examPrev() { if(examState.idx > 0){ examState.idx--; render(); } }
function examNext() { if(examState.idx < 29){ examState.idx++; render(); } }

function submitExam() {
  const unanswered = 30 - Object.keys(examState.answers).length;
  if (unanswered > 0) {
    if (!confirm(`Bạn còn ${unanswered} câu chưa trả lời. Bạn có muốn nộp bài không?`)) return;
  }
  examState.phase = 'result';
  render();
}

function examReview() {
  examState.phase = 'review';
  examState.idx = 0;
  render();
}

function resetExam() {
  examState = { phase: 'start', questions: [], answers: {}, idx: 0 };
  render();
}

function renderExamStart() {
  const app = document.getElementById('app');
  const modeTabs = `<div class="mode-row">
    <button class="mode-btn${appMode==='practice'?' active':''}" onclick="switchMode('practice')">📚 Luyện tập</button>
    <button class="mode-btn${appMode==='exam'?' active':''}" onclick="switchMode('exam')">📝 Kiểm tra</button>
  </div>`;
  app.innerHTML = modeTabs + `
    <div class="exam-start-card">
      <div style="font-size:36px;margin-bottom:0.5rem">📝</div>
      <h2>Kiểm tra Nền Mặt Đường</h2>
      <p>Bài kiểm tra gồm 30 câu hỏi ngẫu nhiên từ toàn bộ nội dung.<br>Chấm điểm theo thang điểm 10.</p>
      <ul class="exam-info-list">
        <li>📌 30 câu hỏi trắc nghiệm ngẫu nhiên</li>
        <li>📊 Thang điểm 10 (mỗi câu đúng = 1/3 điểm)</li>
        <li>✅ Điểm đạt: từ 5.0 trở lên</li>
        <li>🔀 Câu hỏi được rút ngẫu nhiên từ ${ALL_QUESTIONS.length} câu</li>
      </ul>
      <button class="nav-btn primary" onclick="startExam()" style="padding:12px 32px;font-size:15px">Bắt đầu kiểm tra →</button>
    </div>`;
}

function renderExam(modeTabs) {
  const app = document.getElementById('app');
  if (!modeTabs) modeTabs = `<div class="mode-row">
    <button class="mode-btn${appMode==='practice'?' active':''}" onclick="switchMode('practice')">📚 Luyện tập</button>
    <button class="mode-btn${appMode==='exam'?' active':''}" onclick="switchMode('exam')">📝 Kiểm tra</button>
  </div>`;

  if (examState.phase === 'start') { renderExamStart(); return; }

  if (examState.phase === 'result' || examState.phase === 'review') {
    renderExamResult(modeTabs); return;
  }

  // DOING phase
  const q = examState.questions[examState.idx];
  const chosen = examState.answers[examState.idx];
  const answeredCount = Object.keys(examState.answers).length;
  const pct = Math.round((answeredCount / 30) * 100);

  const navDots = examState.questions.map((_, i) => {
    let cls = 'q-nav-dot';
    if (examState.answers[i] !== undefined) cls += ' answered';
    if (i === examState.idx) cls += ' current';
    return `<button class="${cls}" onclick="examGoTo(${i})">${i+1}</button>`;
  }).join('');

  app.innerHTML = modeTabs + `
    <div class="header">
      <div class="source-credit">Nguồn: Lê Văn Nam - QLXD K65</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="meta">
        <span class="exam-progress-text">${q.ch} • Đã trả lời: ${answeredCount}/30</span>
        <span class="score-badge">Câu ${examState.idx+1}/30</span>
      </div>
    </div>
    <div class="card">
      <div class="chapter-tag">${q.ch}</div>
      <div class="question-text">Câu ${examState.idx+1}: ${q.q}</div>
      <div class="options">
        ${q.opts.map((opt,i) => {
          let cls = 'exam-option-btn';
          if (chosen === i) cls += ' selected';
          return `<button class="${cls}" onclick="examSelectAnswer(${i})"><strong>${LABELS[i]}.</strong> ${opt}</button>`;
        }).join('')}
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="examPrev()" ${examState.idx===0?'disabled':''}>← Trước</button>
      ${examState.idx < 29
        ? `<button class="nav-btn primary" onclick="examNext()">Tiếp →</button>`
        : `<button class="nav-btn primary" onclick="submitExam()">Nộp bài ✓</button>`}
    </div>
    <div style="margin-top:1rem">
      <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px;font-weight:500">Điều hướng câu hỏi:</div>
      <div class="question-nav-grid">${navDots}</div>
    </div>
    <div class="submit-section">
      <button class="nav-btn primary" onclick="submitExam()" style="padding:10px 24px">📋 Nộp bài và xem kết quả</button>
    </div>`;
}

function renderExamResult(modeTabs) {
  const app = document.getElementById('app');
  let correct = 0;
  examState.questions.forEach((q, i) => {
    if (examState.answers[i] === q.ans) correct++;
  });
  const score10 = Math.round((correct / 30) * 10 * 10) / 10;
  const pct = Math.round((correct / 30) * 100);
  const pass = score10 >= 5;

  let grade = '';
  if (score10 >= 9) grade = 'Xuất sắc 🏆';
  else if (score10 >= 8) grade = 'Giỏi 🌟';
  else if (score10 >= 7) grade = 'Khá 👍';
  else if (score10 >= 5) grade = 'Trung bình ✓';
  else grade = 'Chưa đạt ✗';

  if (examState.phase === 'review') {
    // Show detailed review
    const reviewItems = examState.questions.map((q, i) => {
      const userAns = examState.answers[i];
      const isCorrect = userAns === q.ans;
      return `<div class="review-item ${isCorrect?'correct-item':'wrong-item'}">
        <div class="review-q">${i+1}. ${q.q}</div>
        ${userAns !== undefined
          ? `<div class="review-ans ${isCorrect?'correct':'wrong'}">
              ${isCorrect ? '✓' : '✗'} Bạn chọn: <strong>${LABELS[userAns]}. ${q.opts[userAns]}</strong>
            </div>`
          : `<div class="no-answer-note">— Không trả lời</div>`}
        ${!isCorrect ? `<div class="review-ans correct">✓ Đáp án đúng: <strong>${LABELS[q.ans]}. ${q.opts[q.ans]}</strong></div>` : ''}
      </div>`;
    }).join('');

    app.innerHTML = modeTabs + `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
        <button class="nav-btn" onclick="examState.phase='result';render()" style="flex:none;padding:8px 16px">← Kết quả</button>
        <span style="font-size:15px;font-weight:600;color:var(--color-text-primary)">Xem lại đáp án</span>
      </div>
      <div class="review-list">${reviewItems}</div>
      <div style="margin-top:1rem;display:flex;gap:10px">
        <button class="nav-btn" onclick="examState.phase='result';render()" style="flex:1">← Quay lại</button>
        <button class="nav-btn primary" onclick="resetExam()" style="flex:1">Làm bài mới</button>
      </div>`;
    return;
  }

  app.innerHTML = modeTabs + `
    <div class="exam-result-card">

<div class="admin-box">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <h3>🛡️ Quản trị hệ thống</h3>
    <button onclick="closeAdmin()" style="border:none;background:none;font-size:20px;cursor:pointer;color:#9ca3af">✕</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('devices')">📱 Thiết bị đăng nhập</button>
    <button class="admin-tab" onclick="switchTab('password')">🔑 Đổi mật khẩu</button>
  </div>

  <!-- TAB: DEVICES -->
  <div class="admin-section active" id="tab-devices">

      <button class="admin-btn secondary" onclick="refreshDevices()" style="flex:1;font-size:13px">🔄 Làm mới</button>
      <button class="admin-btn danger" onclick="kickAllDevices()" style="flex:1;font-size:13px">⛔ Đăng xuất tất cả</button>
    </div>
    <div class="device-list" id="deviceList"></div>

    <input class="admin-input" id="confirmPwd" type="password" placeholder="Xác nhận mật khẩu mới">
    <button class="admin-btn primary" onclick="changePassword()">💾 Cập nhật mật khẩu</button>
    <div id="adminMsg" class="admin-msg"></div>
  </div>
</div>
</div>

<script>
const ADMIN_PASSWORD='Admin@2026#';
const DEVICE_STORE_KEY='quiz_devices';
const SESSION_KEY='quiz_session_id';
const BLOCKED_KEY='quiz_blocked_sessions';

// ── Device fingerprint ──────────────────────────────
function getOrCreateSessionId(){
  let sid=sessionStorage.getItem(SESSION_KEY);
  if(!sid){
    sid='dev_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
    sessionStorage.setItem(SESSION_KEY,sid);
  }
  return sid;
}

function getBrowserInfo(){
  const ua=navigator.userAgent;
  let browser='Trình duyệt khác';
  if(ua.includes('Chrome')&&!ua.includes('Edg'))browser='Chrome';
  else if(ua.includes('Firefox'))browser='Firefox';
  else if(ua.includes('Safari')&&!ua.includes('Chrome'))browser='Safari';
  else if(ua.includes('Edg'))browser='Edge';
  const isMobile=/Mobi|Android|iPhone|iPad/i.test(ua);
  return (isMobile?'📱 ':'💻 ')+browser;
}

function getDevices(){
  try{return JSON.parse(localStorage.getItem(DEVICE_STORE_KEY)||'[]');}catch{return [];}
}
function saveDevices(d){localStorage.setItem(DEVICE_STORE_KEY,JSON.stringify(d));}
function getBlocked(){
  try{return JSON.parse(localStorage.getItem(BLOCKED_KEY)||'[]');}catch{return [];}
}
function saveBlocked(b){localStorage.setItem(BLOCKED_KEY,JSON.stringify(b));}

function registerDevice(){
  const sid=getOrCreateSessionId();
  const blocked=getBlocked();
  if(blocked.includes(sid)){
    // Force logout
    localStorage.removeItem('quiz_logged_in');
    location.reload();
    return;
  }
  const devices=getDevices();
  const now=Date.now();
  const idx=devices.findIndex(d=>d.id===sid);
  if(idx===-1){
    devices.push({id:sid,browser:getBrowserInfo(),loginTime:now,lastSeen:now,ip:'—'});
  }else{
    devices[idx].lastSeen=now;
  }
  // Keep only last 50 entries
  while(devices.length>50)devices.shift();
  saveDevices(devices);
}

function checkBlocked(){
  const sid=getOrCreateSessionId();
  const blocked=getBlocked();
  if(blocked.includes(sid)&&localStorage.getItem('quiz_logged_in')==='1'){
    localStorage.removeItem('quiz_logged_in');
    alert('⛔ Thiết bị này đã bị quản trị viên đăng xuất.');
    location.reload();
  }
}

// Register on login & periodically check
function onLoginSuccess(){
  registerDevice();
  setInterval(checkBlocked,8000);
}

// Patch checkLogin to register device
window.addEventListener('load',()=>{
  if(localStorage.getItem('quiz_logged_in')==='1'){
    registerDevice();
    setInterval(checkBlocked,8000);
  }
});

// ── Admin UI ────────────────────────────────────────
function openAdmin(){
  const p=prompt('Nhập mật khẩu quản trị viên:');
  if(p!==ADMIN_PASSWORD){alert('❌ Sai mật khẩu quản trị viên');return;}
  document.getElementById('adminModal').style.display='block';
  switchTab('devices');
  refreshDevices();
}
function closeAdmin(){document.getElementById('adminModal').style.display='none';}

function switchTab(t){
  document.querySelectorAll('.admin-tab').forEach((b,i)=>b.classList.toggle('active',['devices','password'][i]===t));
  document.querySelectorAll('.admin-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
}

function fmtTime(ts){
  if(!ts)return '—';
  const d=new Date(ts);
  return d.toLocaleDateString('vi-VN')+' '+d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
}
function timeSince(ts){
  if(!ts)return '';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60)return s+'s trước';
  if(s<3600)return Math.floor(s/60)+'p trước';
  if(s<86400)return Math.floor(s/3600)+'h trước';
  return Math.floor(s/86400)+'d trước';
}

function refreshDevices(){
  const devices=getDevices();
  const blocked=getBlocked();
  const myId=getOrCreateSessionId();
  const list=document.getElementById('deviceList');
  const stats=document.getElementById('devStats');
  const active=devices.filter(d=>!blocked.includes(d.id)&&(Date.now()-d.lastSeen)<300000).length;
  const blockedCount=blocked.length;

  stats.innerHTML=`
    <div class="stat-box"><div class="stat-num">${devices.length}</div><div class="stat-lbl">Tổng thiết bị</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#1D9E75">${active}</div><div class="stat-lbl">Đang hoạt động</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#EF4444">${blockedCount}</div><div class="stat-lbl">Đã chặn</div></div>`;

  if(devices.length===0){
    list.innerHTML='<div class="no-devices">📭 Chưa có thiết bị nào đăng nhập</div>';return;
  }

  // Sort: current first, then by lastSeen desc
  const sorted=[...devices].sort((a,b)=>{
    if(a.id===myId)return -1;if(b.id===myId)return 1;
    return b.lastSeen-a.lastSeen;
  });

  list.innerHTML=sorted.map(dev=>{
    const isMe=dev.id===myId;
    const isBlocked=blocked.includes(dev.id);
    const isRecent=(Date.now()-dev.lastSeen)<300000;
    let badge=isMe?'<span class="device-badge badge-you">Thiết bị này</span>':
               isBlocked?'<span class="device-badge badge-blocked">Đã chặn</span>':
               isRecent?'<span class="device-badge badge-active">Đang online</span>':'';
    let btnHtml=isMe?'':(isBlocked
      ?`<button class="device-kick-btn restore" onclick="restoreDevice('${dev.id}')">✅ Khôi phục</button>`
      :`<button class="device-kick-btn kick" onclick="kickDevice('${dev.id}')">⛔ Đăng xuất</button>`);
    return `<div class="device-item ${isMe?'current-dev':''} ${isBlocked?'blocked-dev':''}">
      ${btnHtml}
      <div style="font-size:13px;font-weight:600;color:#111827">${dev.browser}${badge}</div>
      <div class="device-meta">
        🔑 Đăng nhập: ${fmtTime(dev.loginTime)}<br>
        🕐 Hoạt động cuối: ${fmtTime(dev.lastSeen)} (${timeSince(dev.lastSeen)})<br>
        🆔 ID: <code style="font-size:11px">${dev.id.slice(0,20)}…</code>
      </div>
    </div>`;
  }).join('');
}

function showDevMsg(msg,ok){
  const el=document.getElementById('devMsg');
  el.className='admin-msg '+(ok?'ok':'err');
  el.innerText=msg;
  setTimeout(()=>{el.className='admin-msg';},3000);
}

function kickDevice(sid){
  if(!confirm('Đăng xuất thiết bị này?'))return;
  const blocked=getBlocked();
  if(!blocked.includes(sid))blocked.push(sid);
  saveBlocked(blocked);
  showDevMsg('✅ Đã đăng xuất thiết bị. Thiết bị sẽ bị tự động ngắt kết nối.','ok');
  refreshDevices();
}

function restoreDevice(sid){
  const blocked=getBlocked().filter(b=>b!==sid);
  saveBlocked(blocked);
  showDevMsg('✅ Đã khôi phục quyền truy cập cho thiết bị.','ok');
  refreshDevices();
}

function kickAllDevices(){
  if(!confirm('⛔ Đăng xuất TẤT CẢ thiết bị (trừ thiết bị này)?\n\nThao tác này sẽ ngắt kết nối tất cả người dùng khác.'))return;
  const myId=getOrCreateSessionId();
  const devices=getDevices();
  const blocked=getBlocked();
  devices.forEach(d=>{if(d.id!==myId&&!blocked.includes(d.id))blocked.push(d.id);});
  saveBlocked(blocked);
  showDevMsg('✅ Đã đăng xuất tất cả thiết bị khác.','ok');
  refreshDevices();
}

// ── Password change ──────────────────────────────────
function showAdminMsg(msg,ok){
  const el=document.getElementById('adminMsg');
  el.className='admin-msg '+(ok?'ok':'err');
  el.innerText=msg;
}
function changePassword(){
  const oldP=document.getElementById('oldPwd').value;
  const newP=document.getElementById('newPwd').value;
  const conf=document.getElementById('confirmPwd').value;
  const current=localStorage.getItem('quiz_password');
  if(oldP!==current){showAdminMsg('❌ Sai mật khẩu hiện tại','err');return;}
  if(newP.length<4){showAdminMsg('❌ Mật khẩu mới phải từ 4 ký tự','err');return;}
  if(newP!==conf){showAdminMsg('❌ Mật khẩu xác nhận không khớp','err');return;}
  localStorage.setItem('quiz_password',newP);
  document.getElementById('oldPwd').value='';
  document.getElementById('newPwd').value='';
  document.getElementById('confirmPwd').value='';
  showAdminMsg('✅ Đổi mật khẩu thành công!','ok');
}

// ── Patch login ──────────────────────────────────────
(function(){
  if(!localStorage.getItem('quiz_password'))localStorage.setItem('quiz_password','QLXDK65-2026');
  window.checkLogin=function(){
    const p=document.getElementById('pwd').value;
    const real=localStorage.getItem('quiz_password');
    if(p===real){
      localStorage.setItem('quiz_logged_in','1');
      document.getElementById('loginOverlay').style.display='none';
      onLoginSuccess();
    }else{
      document.getElementById('loginError').innerText='Mật khẩu không đúng';
    }
  };
})();
</script>

</body>
